    <form
    action="https://formspree.io/f/xkoqjaoz"
    method="POST"
>

    <div class="form-group">
        <input
        type="text"
        class="form-control"
        name="name"
        placeholder="Your Name"
        required
        >
    </div>

    <div class="form-group">
        <input
        type="email"
        class="form-control"
        name="email"
        placeholder="Your Email"
        required
        >
    </div>

    <div class="form-group">
        <textarea
        class="form-control"
        name="message"
        rows="6"
        placeholder="Your Message"
        required
        ></textarea>
    </div>

    <button class="btn btn-primary send-button" type="submit">
        Send Message
    </button>
</form>
